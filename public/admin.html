<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hesi 管理后台</title>
  <style>
    :root { --bg:#f6f7f9; --card:#fff; --text:#1f2329; --muted:#6b7280; --border:#e5e7eb; --accent:#2563eb; --ok:#16a34a; --off:#9ca3af; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background:var(--bg); color:var(--text); }
    header { padding:16px 24px; background:var(--card); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; }
    header h1 { font-size:18px; margin:0; }
    .wrap { max-width:1100px; margin:0 auto; padding:24px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px; }
    .card h3 { margin:0 0 10px; font-size:14px; color:var(--muted); font-weight:600; }
    .stat { font-size:28px; font-weight:700; }
    .cap { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border); font-size:13px; }
    .cap:last-child { border-bottom:none; }
    .pill { font-size:12px; padding:2px 8px; border-radius:999px; font-weight:600; }
    .pill.on { background:#dcfce7; color:var(--ok); }
    .pill.off { background:#f3f4f6; color:var(--off); }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th, td { text-align:left; padding:8px 10px; border-bottom:1px solid var(--border); }
    th { color:var(--muted); font-weight:600; }
    .toolbar { display:flex; gap:10px; align-items:center; margin-bottom:16px; flex-wrap:wrap; }
    input[type=text] { padding:8px 10px; border:1px solid var(--border); border-radius:8px; min-width:320px; }
    button { padding:8px 14px; border:1px solid var(--border); border-radius:8px; background:var(--accent); color:#fff; cursor:pointer; font-size:13px; }
    button.ghost { background:#fff; color:var(--text); }
    .note { color:var(--muted); font-size:12px; }
  </style>
</head>
<body>
  <header>
    <h1>🛡️ Hesi 管理后台</h1>
    <span class="note">统一审计 · 能力门控 · 增长指标</span>
  </header>
  <div class="wrap">
    <div class="toolbar">
      <input type="text" id="token" placeholder="（企业模式）粘贴登录返回的 token；本地模式可留空" />
      <button id="refresh">刷新</button>
      <a class="note" id="export" href="#" download>导出审计 CSV</a>
    </div>

    <div class="grid" style="margin-bottom:16px;">
      <div class="card"><h3>近 7 天审计事件</h3><div class="stat" id="m-events">–</div></div>
      <div class="card"><h3>PTY 命令执行</h3><div class="stat" id="m-pty">–</div></div>
      <div class="card"><h3>文件上传</h3><div class="stat" id="m-uploads">–</div></div>
      <div class="card"><h3>日活(遥测)</h3><div class="stat" id="m-dau">–</div></div>
    </div>

    <div class="card" style="margin-bottom:16px;">
      <h3>能力矩阵（许可模式：<span id="mode">–</span>）</h3>
      <div id="caps"></div>
    </div>

    <div class="card">
      <h3>最近审计事件</h3>
      <table>
        <thead><tr><th>时间</th><th>类型</th><th>动作</th><th>用户</th><th>详情</th></tr></thead>
        <tbody id="audit-rows"><tr><td colspan="5" class="note">加载中…</td></tr></tbody>
      </table>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    function authHeader() {
      const t = $('token').value.trim();
      return t ? { 'Authorization': 'Bearer ' + t } : {};
    }
    function fmtDetail(r) {
      if (r.cmd) return r.cmd.slice(0, 80);
      if (r.tool) return r.tool;
      if (r.meta) return JSON.stringify(r.meta).slice(0, 80);
      return '';
    }
    async function load() {
      try {
        const m = await (await fetch('/api/metrics', { headers: authHeader() })).json();
        $('m-events').textContent = m.audit?.eventsLast7d ?? '–';
        $('m-pty').textContent = m.audit?.ptyCommands ?? '–';
        $('m-uploads').textContent = m.audit?.uploads ?? '–';
        $('m-dau').textContent = m.telemetry?.dailyActiveUsers ?? '–';
        $('mode').textContent = m.mode;
        const caps = $('caps'); caps.innerHTML = '';
        for (const [k, v] of Object.entries(m.capabilities || {})) {
          const row = document.createElement('div');
          row.className = 'cap';
          row.innerHTML = `<span>${v.label}</span><span class="pill ${v.enabled ? 'on' : 'off'}">${v.enabled ? '已解锁' : '社区版'}</span>`;
          caps.appendChild(row);
        }
      } catch (e) { console.warn('metrics failed', e); }

      try {
        const a = await (await fetch('/api/admin/audit?limit=50', { headers: authHeader() })).json();
        const tb = $('audit-rows'); tb.innerHTML = '';
        (a.events || []).forEach((r) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${new Date(r.t).toLocaleString()}</td><td>${r.type}</td><td>${r.action || ''}</td><td>${r.user || ''}</td><td>${fmtDetail(r)}</td>`;
          tb.appendChild(tr);
        });
        if (!a.events || !a.events.length) tb.innerHTML = '<tr><td colspan="5" class="note">暂无事件</td></tr>';
      } catch (e) {
        $('audit-rows').innerHTML = '<tr><td colspan="5" class="note">加载审计失败（企业模式需填 token）</td></tr>';
      }
    }
    $('refresh').onclick = load;
    $('export').onclick = () => {
      const t = $('token').value.trim();
      $('export').href = '/api/admin/audit/export' + (t ? '' : '');
      // token via header can't be set on anchor; for enterprise, copy URL + use fetch+blob instead:
      if (t) {
        fetch('/api/admin/audit/export', { headers: { Authorization: 'Bearer ' + t } })
          .then(r => r.blob()).then(b => {
            const u = URL.createObjectURL(b); const a = document.createElement('a');
            a.href = u; a.download = 'hesi-audit.csv'; a.click(); URL.revokeObjectURL(u);
          });
        return false;
      }
    };
    load();
  </script>
</body>
</html>
