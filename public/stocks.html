<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>股票分析 — Hesi</title>
  <link rel="stylesheet" href="/css/theme.css" />
  <link rel="stylesheet" href="/css/standalone-nav.css" />
  <link rel="stylesheet" href="/css/stocks.css" />
  <link rel="stylesheet" href="/css/charts.css" />
  <style>
    /* Override the 320px panel constraint — use full width */
    #rp-stocks .stock-content {
      max-width: 800px;
      margin: 0 auto;
      padding: var(--space-3, 16px);
    }
    /* Widen chart area for standalone */
    #rp-stocks .stock-chart-area {
      height: 320px;
      min-height: 240px;
    }
    /* Stats grid: 3 columns on wider standalone page */
    #rp-stocks .stock-stats-grid {
      grid-template-columns: repeat(3, 1fr);
    }
  </style>
</head>
<body class="sa-page" data-theme="dark">
  <!-- Top Nav -->
  <nav class="sa-nav">
    <a class="sa-nav-back" href="/" onclick="event.preventDefault(); location.href='/';">&larr; 返回主应用</a>
    <span class="sa-nav-title">📈 股票分析</span>
    <span class="sa-nav-subtitle">独立页面</span>
    <span class="sa-nav-spacer"></span>
    <span class="sa-nav-status">独立模式</span>
  </nav>

  <!-- Stock Panel — same id as in main app, auto-initialized by stock-analysis.js -->
  <div class="sa-panel active" id="rp-stocks">
    <div class="sa-loading">
      <div class="sa-loading-icon">📈</div>
      加载中...
    </div>
  </div>

  <!-- Bundle + Lazy Bundle — includes stock-analysis.js (in lazy-bundle) -->
  <script src="/bundle.js"></script>
  <script src="/lazy-bundle.js"></script>
  <script>
    // ── Read saved theme from localStorage for consistency with main app ──
    (function() {
      var savedTheme = localStorage.getItem('qcli-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();

    // ── Render stock analysis once the module is ready ──
    (function doRender() {
      'use strict';
      var panel = document.getElementById('rp-stocks');
      if (!panel) return;

      function checkAndRender() {
        if (window.QCLI && window.QCLI.Stocks) {
          // Module is ready — force init + render
          if (!window.QCLI.Stocks._initialized) {
            window.QCLI.Stocks.init();
          }
          window.QCLI.Stocks.render();
        } else {
          // Module not loaded yet — retry
          setTimeout(checkAndRender, 200);
        }
      }
      checkAndRender();
    })();
  </script>
</body>
</html>
