<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>多媒体 — Hesi</title>
  <link rel="stylesheet" href="/css/theme.css" />
  <link rel="stylesheet" href="/css/standalone-nav.css" />
  <link rel="stylesheet" href="/css/media.css" />
  <style>
    #rp-media {
      flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden;
    }
    #rp-media .media-content {
      max-width: none;
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }
    /* Widen gallery for standalone */
    #rp-media .media-gallery {
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    }
  </style>
</head>
<body class="sa-page" data-theme="dark">
  <nav class="sa-nav">
    <a class="sa-nav-back" href="/" onclick="event.preventDefault(); location.href='/';">&larr; 返回主应用</a>
    <span class="sa-nav-title">🎬 多媒体</span>
    <span class="sa-nav-subtitle">独立页面</span>
    <span class="sa-nav-spacer"></span>
    <span class="sa-nav-status">独立模式</span>
  </nav>
  <div class="sa-panel active" id="rp-media">
    <div class="sa-loading">
      <div class="sa-loading-icon">🎬</div>
      加载中...
    </div>
  </div>
  <script src="/bundle.js"></script>
  <script src="/lazy-bundle.js"></script>
  <script>
    (function() {
      'use strict';

      // ── Read saved theme ──
      (function() {
        var savedTheme = localStorage.getItem('qcli-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
      })();

      // ── Retry loop until module is ready ──
      (function doRender() {
        var panel = document.getElementById('rp-media');
        if (!panel) return;

        function checkAndRender() {
          if (window.QCLI && window.QCLI.Media) {
            if (!window.QCLI.Media._initialized) window.QCLI.Media.init();
            window.QCLI.Media.render();
          } else {
            setTimeout(checkAndRender, 250);
          }
        }
        checkAndRender();
      })();
    })();
  </script>
</body>
</html>
