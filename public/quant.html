<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>量化交易 — Hesi</title>
  <link rel="stylesheet" href="/css/theme.css" />
  <link rel="stylesheet" href="/css/standalone-nav.css" />
  <link rel="stylesheet" href="/css/quant-trading.css" />
  <style>
    /* Override the 320px panel constraint — use full width */
    #rp-quant .quant-content {
      max-width: none;
      padding: var(--space-3, 16px);
    }

    /* Widen fixed-width elements for standalone */
    #rp-quant .quant-chart-wrap {
      min-height: 420px;
    }
  </style>
</head>
<body class="sa-page" data-theme="dark">
  <!-- Top Nav -->
  <nav class="sa-nav">
    <a class="sa-nav-back" href="/" onclick="event.preventDefault(); if(window.QCLI?.QuantTrading) QCLI.QuantTrading._isRunning = false; location.href='/';">&larr; 返回主应用</a>
    <span class="sa-nav-title">🤖 量化交易</span>
    <span class="sa-nav-subtitle">独立页面</span>
    <span class="sa-nav-spacer"></span>
    <span class="sa-nav-status" id="quant-nav-status">后端: 检测中...</span>
  </nav>

  <!-- Quant Panel — same id as in main app, auto-initialized by quant-trading.js -->
  <div class="sa-panel active" id="rp-quant">
    <div class="sa-loading">
      <div class="sa-loading-icon">🤖</div>
      加载中...
    </div>
  </div>

  <!-- Bundle + Lazy Bundle — includes quant-trading.js (in lazy-bundle) -->
  <script src="/bundle.js"></script>
  <script src="/lazy-bundle.js"></script>
  <script>
    (function() {
      'use strict';

      // ── Read saved theme ──
      (function() {
        var savedTheme = localStorage.getItem('qcli-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
      })();

      // ── Retry loop until module is ready ──
      (function doRender() {
        var panel = document.getElementById('rp-quant');
        if (!panel) return;

        function checkAndRender() {
          if (window.QCLI && window.QCLI.QuantTrading) {
            if (!window.QCLI.QuantTrading._initialized) window.QCLI.QuantTrading.init();
            window.QCLI.QuantTrading.render();
            // Check backend status in background
            fetch('/api/quant/market-data?symbol=BTC/USDT&tf=1h')
              .then(function(r) { return r.ok ? '在线' : '离线'; })
              .catch(function() { return '离线'; })
              .then(function(status) {
                var el = document.getElementById('quant-nav-status');
                if (el) el.textContent = '后端: ' + status;
              });
          } else {
            // Module not loaded yet — retry
            setTimeout(checkAndRender, 250);
          }
        }
        checkAndRender();
      })();
    })();
  </script>
</body>
</html>
