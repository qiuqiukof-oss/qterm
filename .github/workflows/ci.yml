name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # --ignore-scripts skips native builds (e.g. node-pty's gyp step) which are only
      # needed at runtime. CI only runs the frontend build + backend syntax checks, so the
      # prebuilt esbuild binary (pulled in via optionalDependencies) is sufficient.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build frontend bundle
        run: npm run build

      - name: Backend syntax checks
        run: npm run check:server
