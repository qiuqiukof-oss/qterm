name: Bug report
description: Report a problem with Hesi
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Start the server with `npm start`
        2. Open http://127.0.0.1:4264
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Hesi version
      placeholder: e.g. 1.1.0
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: e.g. 22.22.2
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      description: Paste any error output. Avoid sharing secrets or `.env` contents.
    validations:
      required: false
